<svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 789 449" width="789" height="449">
	<title>MASAKA HOSPITAL - MediFix</title>
	<defs>
		<image width="789" height="166" id="img1" href="data:image/png;base64,"/>
		<image width="265" height="175" id="img2" href="data:image/png;base64," />
	</defs>
	<style>
		.hospital-name { font-family: 'Inter', 'Segoe UI', Roboto, sans-serif; font-size: 50px; font-weight: 800; fill: #ffffff; text-transform: uppercase; letter-spacing: 2px; }
		.line { stroke: #ffffff; stroke-width: 3; opacity: 0.6; }
	</style>
	<!-- Hospital Icon (New User Provided Icon) -->
	<use id="icon" href="#img2" transform="matrix(0.8,0,0,0.8,290,10)"/>
	
	<!-- Hospital Name -->
	<text x="394" y="240" class="hospital-name" text-anchor="middle">MASAKA HOSPITAL</text>
	
	<!-- Separator Line -->
	<line x1="80" y1="260" x2="710" y2="260" class="line" />
	
	<!-- MediFix Logo/Text -->
	<use id="medifix" href="#img1" transform="matrix(1,0,0,1,0,283)"/>
</svg>